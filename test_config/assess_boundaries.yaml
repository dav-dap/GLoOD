# --- Slurm directive defaults -------------------------------------
slurm: # Do not touch
  job_name: a_bound
  partition: nodes
  time: "00:10:00"
  nodes: 1
  ntasks: 1
  cpus_per_task: 1

# --- Launcher-specific defaults -----------------------------------
cmd: python3 -m glood.assess_boundaries
prelude: []
sandbox: false # Do not touch
sandbox_root: git_ignore/test_runs/assess_boundaries # Do not touch

local: true

# --- Program-argument defaults ------------------------------------
program:
  input_dir: git_ignore/test_runs/train_glood_unet_matnum/0/train
  assessment:
    epsilon: 1.0e-8
    matnum_value: 1
