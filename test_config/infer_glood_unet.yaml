# ─── Slurm directive defaults ─────────────────────────────────────
slurm: # Do not touch
  job_name: i_glood
  partition: gpu-v100
  time: "00:40:00"
  gres: gpu:1
  nodes: 1
  ntasks: 1

# ─── Launcher-specific defaults ───────────────────────────────────
cmd: glood_infer # Do not touch
prelude: # Do not touch
  - module  load miniforge3/25.3.0-python3.12.10 # Do not touch
  - source activate env-torch-128 # Do not touch
sandbox: false # Do not touch
sandbox_root: git_ignore/test_runs/infer_glood_unet # Do not touch
local: true

# ─── Program-argument defaults ────────────────────────────────────
program: # Do not touch
  dataset: sharded_series # Do not touch

  model_folder: git_ignore/test_runs/train_glood_unet/0

  hyperparams_dataset: # Do not touch
    dataset_base_folder: git_ignore/test_runs/dataset_seq/0

  infer_params: # Do not touch
    n_items: 2
