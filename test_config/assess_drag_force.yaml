# --- Slurm directive defaults -------------------------------------
slurm: # Do not touch
  job_name: a_drag
  partition: nodes
  time: "00:10:00"
  nodes: 1
  ntasks: 1
  cpus_per_task: 1

# --- Launcher-specific defaults -----------------------------------
cmd: python3 -m glood.assess_drag_force
prelude: []
sandbox: false # Do not touch
sandbox_root: git_ignore/test_runs/assess_drag_force # Do not touch

local: true

# --- Program-argument defaults ------------------------------------
program:
  input_dir: git_ignore/test_runs/train_glood_unet_matnum/0/train
