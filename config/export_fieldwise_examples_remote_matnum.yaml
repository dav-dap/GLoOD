# --- Slurm directive defaults -------------------------------------
slurm:
  job_name: x_fieldfig
  partition: nodes
  time: "00:30:00"
  nodes: 1
  ntasks: 1
  cpus_per_task: 1

# --- Launcher-specific defaults -----------------------------------
cmd: python3 -m glood.export_fieldwise_examples
prelude: []
sandbox: true
sandbox_root: git_ignore/runs/export_fieldwise_examples_remote_matnum

local: true

# --- Program-argument defaults ------------------------------------
program: {}
