# ─── Slurm directive defaults ─────────────────────────────────────
slurm: # Do not touch
  job_name: d_seq
  partition: nodes
  time: "20:00:00"
  nodes: 1
  ntasks: 1
  cpus_per_task: 1

# ─── Launcher-specific defaults ───────────────────────────────────
cmd: glood_build_dataset # Do not touch
prelude: # Do not touch
  - module load miniforge3/25.3.0-python3.12.10 # Do not touch
  - source activate env-torch-128 # Do not touch
sandbox: true # Do not touch
sandbox_root: git_ignore/runs/dataset_matnum # Do not touch
local: false

# ─── Program-argument defaults ────────────────────────────────────
program: # Do not touch
  parsing: series_with_matnum
  plotters: series

  dataset:
    examples_per_file: 128
    shuffle: false
    shapes:
      C: 4

  diagnostics:
    examples_to_plot: 1

  input_dir: /users/dapelo/data/glood-demo_paper01_supporting_evidence/datasets_test/circles_matnum_raw,/users/dapelo/data/glood-demo_paper01_supporting_evidence/datasets_test/squares_matnum_raw,/users/dapelo/data/glood-demo_paper01_supporting_evidence/datasets_test/cavity_matnum_raw
