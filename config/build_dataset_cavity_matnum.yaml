# ─── Slurm directive defaults ─────────────────────────────────────
slurm: # Do not touch
  job_name: d_seq
  partition: nodes
  time: "20:00:00"
  nodes: 1
  ntasks: 1
  cpus_per_task: 1

# ─── Launcher-specific defaults ───────────────────────────────────
cmd: glood_build_dataset # Do not touch
prelude: # Do not touch
  - module load miniforge3/25.3.0-python3.12.10 # Do not touch
  - source activate env-torch-128 # Do not touch
sandbox: true # Do not touch
sandbox_root: git_ignore/runs/dataset_cavity_matnum_Re12000 # Do not touch
local: false

# ─── Program-argument defaults ────────────────────────────────────
program: # Do not touch
  parsing: series_with_matnum
  plotters: series

  dataset:
    examples_per_file: 128
    shuffle: false
    shapes:
      C: 4

  diagnostics:
    examples_to_plot: 3

  input_dir: git_ignore/dataset_cavity_matnum_Re12000_raw
