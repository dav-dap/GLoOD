# --- Slurm directive defaults -------------------------------------
slurm: # Do not touch
  job_name: a_bound
  partition: nodes
  time: "00:10:00"
  nodes: 1
  ntasks: 1
  cpus_per_task: 1

# --- Launcher-specific defaults -----------------------------------
cmd: python3 -m glood.assess_boundaries
prelude: []
sandbox: false # Do not touch
sandbox_root: git_ignore/assess_boundaries_circles # Do not touch

local: true

# --- Program-argument defaults ------------------------------------
program:
  input_dir: git_ignore/infer_glood_swin_circles_matnum_full/0/infer
  assessment:
    epsilon: 1.0e-8
