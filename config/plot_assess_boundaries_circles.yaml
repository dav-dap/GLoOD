# --- Slurm directive defaults -------------------------------------
slurm: # Do not touch
  job_name: p_ab_sweep
  partition: nodes
  time: "00:10:00"
  nodes: 1
  ntasks: 1
  cpus_per_task: 1

# --- Launcher-specific defaults -----------------------------------
cmd: python3 -m glood.plot_assess_boundaries_sweep
prelude: []
sandbox: false # Do not touch
sandbox_root: git_ignore/plot_assess_boundaries_circles # Do not touch

local: true

# --- Program-argument defaults ------------------------------------
program:
  input_dir: git_ignore/assess_boundaries_circles
