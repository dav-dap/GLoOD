# --- Slurm directive defaults -------------------------------------
slurm:
  job_name: paper_snap
  partition: nodes
  time: "00:20:00"
  nodes: 1
  ntasks: 1
  cpus_per_task: 1

# --- Launcher-specific defaults -----------------------------------
cmd: python3 -m glood.paper_snapshot_grid
prelude: []
sandbox: true
sandbox_root: git_ignore/runs/paper_snapshot_grid_examples

local: true

# --- Program-argument defaults ------------------------------------
program: {}
